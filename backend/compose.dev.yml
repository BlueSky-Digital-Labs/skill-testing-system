# Development environment Docker Compose override
# Usage: docker compose --env-file .env.dev -f compose.yml -f compose.dev.yml up

services:
  web:
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/src  # Exclude node_modules if any
    environment:
      - DJANGO_ENV=dev
      - PYTHONPATH=/app/src
      - CERTIFICATES_BUCKET=${CERTIFICATES_BUCKET:-certificates-dev}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    command: python manage.py runserver 0.0.0.0:8000
    stdin_open: true
    tty: true

  celery:
    build: .
    command: celery -A core worker -l info
    volumes:
      - .:/app
    environment:
      - DJANGO_ENV=dev
      - DJANGO_SETTINGS_MODULE=core.settings
      - PYTHONPATH=/app/src
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A core beat -l info
    volumes:
      - .:/app
    environment:
      - DJANGO_ENV=dev
      - DJANGO_SETTINGS_MODULE=core.settings
      - PYTHONPATH=/app/src
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    ports:
      - "5455:5432"

  redis:
    ports:
      - "6379:6379"
